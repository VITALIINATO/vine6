<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Увалы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
            background-image: url('6.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.25rem;
        }
        .error-box {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: #fee;
            border: 2px solid #c33;
            color: #900;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            z-index: 9999;
            max-height: 50vh;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="error-container"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        // Перехватываем все ошибки
        window.onerror = function(msg, url, line, col, error) {
            const errorText = `Ошибка: ${msg}\nФайл: ${url}\nСтрока: ${line}\nСтолбец: ${col}\n\nStack:\n${error ? error.stack : 'N/A'}`;
            document.getElementById('error-container').innerHTML = `<div class="error-box"><b>❌ КРИТИЧЕСКАЯ ОШИБКА:</b>\n\n${errorText}</div>`;
            console.error(errorText);
            return false;
        };
    </script>

    <script type="text/babel">
        try {
            const { useState, useEffect, useMemo, useCallback } = React;
            
            const SCHEDULE_API_URL = "https://api.npoint.io/fbd0a6a7434618bd7c3b";
            const NAMES = ['ФОКС', 'ПИВОВАР', 'НАТО'];

            const App = () => {
                const [currentDate, setCurrentDate] = useState(new Date());
                const [schedule, setSchedule] = useState({});
                const [isLoading, setIsLoading] = useState(true);
                const [isSaving, setIsSaving] = useState(false);
                const [error, setError] = useState(null);

                const today = useMemo(() => {
                    const d = new Date();
                    d.setHours(0, 0, 0, 0);
                    return d;
                }, []);

                useEffect(() => {
                    const loadData = async () => {
                        try {
                            const response = await fetch(SCHEDULE_API_URL);
                            const data = await response.json();
                            setSchedule(data || {});
                        } catch (err) {
                            setError("Не удалось загрузить: " + err.message);
                        } finally {
                            setIsLoading(false);
                        }
                    };
                    loadData();
                }, []);

                const saveData = async (newSchedule) => {
                    setIsSaving(true);
                    try {
                        await fetch(SCHEDULE_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newSchedule)
                        });
                    } catch (err) {
                        console.error("Save error:", err);
                    } finally {
                        setIsSaving(false);
                    }
                };

                const handleSelect = useCallback((date, person) => {
                    const key = date.toISOString().split('T')[0];
                    setSchedule(prev => {
                        const next = { ...prev };
                        if (person) {
                            next[key] = person;
                        } else {
                            delete next[key];
                        }
                        saveData(next);
                        return next;
                    });
                }, []);

                const changeMonth = (offset) => {
                    setCurrentDate(prev => new Date(prev.getFullYear(), prev.getMonth() + offset, 1));
                };

                const days = useMemo(() => {
                    const year = currentDate.getFullYear();
                    const month = currentDate.getMonth();
                    const firstDay = new Date(year, month, 1);
                    const lastDay = new Date(year, month + 1, 0);
                    const startDay = (firstDay.getDay() + 6) % 7;
                    const result = [];

                    for (let i = startDay; i > 0; i--) {
                        result.push({ date: new Date(year, month - 1, new Date(year, month, 0).getDate() - i + 1), current: false });
                    }
                    for (let i = 1; i <= lastDay.getDate(); i++) {
                        const d = new Date(year, month, i);
                        result.push({ date: d, current: true, today: d.getTime() === today.getTime() });
                    }
                    while (result.length < 42) {
                        result.push({ date: new Date(year, month + 1, result.length - lastDay.getDate() + 1), current: false });
                    }
                    return result;
                }, [currentDate, today]);

                if (isLoading) {
                    return React.createElement('div', { className: 'flex flex-col items-center justify-center min-h-screen' },
                        React.createElement('div', { className: 'loader' }),
                        React.createElement('div', { className: 'mt-4 text-lg font-semibold text-indigo-600' }, 'Загрузка...')
                    );
                }

                return React.createElement('div', { className: 'flex flex-col items-center justify-center min-h-screen p-2 sm:p-4' },
                    React.createElement('div', { className: 'w-full max-w-4xl bg-white rounded-2xl shadow-xl p-4 sm:p-6 relative' },
                        error && React.createElement('div', { className: 'mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm' }, error),
                        
                        React.createElement('header', { className: 'flex items-center justify-between mb-4' },
                            React.createElement('button', { onClick: () => changeMonth(-1), className: 'p-2 rounded-full hover:bg-indigo-50' }, '←'),
                            React.createElement('h2', { className: 'text-lg sm:text-xl font-bold text-indigo-800 capitalize' },
                                currentDate.toLocaleString('ru-RU', { month: 'long' }) + ' ' + currentDate.getFullYear()
                            ),
                            React.createElement('button', { onClick: () => changeMonth(1), className: 'p-2 rounded-full hover:bg-indigo-50' }, '→')
                        ),

                        React.createElement('div', { className: 'calendar-grid text-xs sm:text-sm text-center font-bold text-indigo-900 mb-2' },
                            ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => React.createElement('div', { key: d }, d))
                        ),

                        React.createElement('div', { className: 'calendar-grid' },
                            days.map(({ date, current, today: isToday }) => {
                                const key = date.toISOString().split('T')[0];
                                const person = schedule[key];
                                const isPast = date < today;

                                return React.createElement('div', { 
                                    key, 
                                    className: `aspect-square flex flex-col justify-start items-center p-1 sm:p-2 border rounded-lg transition-all ` +
                                        (current ? (person ? 'bg-gradient-to-br from-violet-50 to-purple-50 border-violet-200' : 'bg-white border-slate-200 hover:bg-indigo-50') : 'bg-slate-100 text-slate-400 border-transparent')
                                },
                                    React.createElement('time', { 
                                        className: `w-7 h-7 flex items-center justify-center rounded-full text-sm sm:text-base ` +
                                            (current ? 'text-indigo-800' : 'text-slate-400') +
                                            (isToday ? ' bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-bold shadow-md' : '')
                                    }, date.getDate()),
                                    
                                    current && person && React.createElement(React.Fragment, null,
                                        (isPast || isToday) && React.createElement('div', { className: 'my-0.5 w-2 h-2 bg-green-500 rounded-full' }),
                                        !isPast && !isToday && React.createElement('div', { className: 'my-0.5 w-2 h-2 bg-yellow-500 rounded-full' })
                                    ),
                                    
                                    current && React.createElement('div', { className: 'w-full mt-auto' },
                                        React.createElement('select', {
                                            value: person || '',
                                            onChange: (e) => handleSelect(date, e.target.value),
                                            className: `w-full mt-0.5 text-xs sm:text-sm bg-transparent focus:outline-none text-center cursor-pointer overflow-hidden whitespace-nowrap py-1 ` +
                                                (person ? 'text-purple-700 font-semibold' : 'text-slate-600')
                                        },
                                            React.createElement('option', { value: '' }),
                                            NAMES.map(name => React.createElement('option', { key: name, value: name }, name))
                                        )
                                    )
                                );
                            })
                        ),

                        isSaving && React.createElement('div', { className: 'absolute bottom-4 right-4 text-xs text-violet-600 font-medium animate-pulse bg-white px-3 py-1 rounded-full shadow' }, 'Сохранение...')
                    )
                );
            };

            const rootElement = document.getElementById('root');
            if (!rootElement) {
                throw new Error("Элемент #root не найден в DOM!");
            }
            
            const root = ReactDOM.createRoot(rootElement);
            root.render(React.createElement(App));
            
            console.log("✅ React приложение запущено успешно!");
            
        } catch (error) {
            const errorText = `Ошибка при инициализации React:\n\n${error.message}\n\nStack:\n${error.stack}`;
            document.getElementById('error-container').innerHTML = `<div class="error-box"><b>❌ ОШИБКА REACT:</b>\n\n${errorText}</div>`;
            console.error(errorText);
        }
    </script>
</body>
</html>
