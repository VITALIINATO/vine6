<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Увалы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #F8FAFC;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%2364748b'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Загрузка React и Babel из CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // КЛЮЧ ХРАНИЛИЩА
        const STORAGE_ID = "Mpiv4TNHfTptNXfm1W7xBp";
        const SCHEDULE_API_URL = `https://kvdb.io/${STORAGE_ID}/schedule`;

        const NAMES = ['', 'ФОКС', 'ПИВОВАР', 'НАТО'];
        const WEEK_DAYS = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [schedule, setSchedule] = useState({});
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);

            const today = useMemo(() => {
                const d = new Date();
                d.setHours(0, 0, 0, 0);
                return d;
            }, []);

            useEffect(() => {
                const fetchSchedule = async () => {
                    setIsLoading(true);
                    try {
                        const response = await fetch(SCHEDULE_API_URL, { cache: 'no-cache' });
                        if (response.ok) {
                            const data = await response.json();
                            setSchedule(data || {});
                        }
                    } catch (error) {
                        console.error("Ошибка загрузки:", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchSchedule();
            }, []);

            const saveSchedule = useCallback(async (newSchedule) => {
                setIsSaving(true);
                try {
                    await fetch(SCHEDULE_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newSchedule)
                    });
                } catch (error) {
                    console.error("Ошибка сохранения:", error);
                } finally {
                    setIsSaving(false);
                }
            }, []);

            const handleSelectPerson = (date, person) => {
                const key = date.toISOString().split('T')[0];
                const newSchedule = { ...schedule };
                if (person && person.trim() !== '') {
                    newSchedule[key] = person;
                } else {
                    delete newSchedule[key];
                }
                setSchedule(newSchedule);
                saveSchedule(newSchedule);
            };

            const changeMonth = (offset) => {
                setCurrentDate(prev => new Date(prev.getFullYear(), prev.getMonth() + offset, 1));
            };

            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startDay = (firstDay.getDay() + 6) % 7;
                const days = [];

                const prevMonthLast = new Date(year, month, 0).getDate();
                for (let i = startDay; i > 0; i--) {
                    days.push({ date: new Date(year, month - 1, prevMonthLast - i + 1), current: false });
                }
                for (let i = 1; i <= lastDay.getDate(); i++) {
                    const d = new Date(year, month, i);
                    days.push({ date: d, current: true, today: d.getTime() === today.getTime() });
                }
                while (days.length < 42) {
                    days.push({ date: new Date(year, month + 1, days.length - lastDay.getDate() - startDay + 1), current: false });
                }
                return days;
            }, [currentDate, today]);

            if (isLoading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen">
                        <div className="loader mb-4"></div>
                        <p className="text-slate-500 font-medium">Загрузка графика...</p>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-8">
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <header className="p-6 flex items-center justify-between border-b border-slate-100">
                            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <span className="w-2 h-6 bg-indigo-600 rounded-full"></span>
                                Увалы
                            </h1>
                            <div className="flex items-center gap-4">
                                <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-slate-50 rounded-xl transition-colors">
                                    <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                                </button>
                                <span className="font-semibold text-slate-700 capitalize min-w-[140px] text-center">
                                    {currentDate.toLocaleString('ru-RU', { month: 'long', year: 'numeric' })}
                                </span>
                                <button onClick={() => changeMonth(1)} className="p-2 hover:bg-slate-50 rounded-xl transition-colors">
                                    <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                                </button>
                            </div>
                        </header>

                        <div className="calendar-grid bg-slate-50/50 border-b border-slate-100">
                            {WEEK_DAYS.map(d => <div key={d} className="py-3 text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">{d}</div>)}
                        </div>

                        <div className="calendar-grid">
                            {calendarDays.map(({ date, current, today }, i) => {
                                const key = date.toISOString().split('T')[0];
                                const person = schedule[key];
                                const isPast = date.getTime() < today.getTime();

                                return (
                                    <div key={key} className={`min-h-[100px] p-2 border-r border-b border-slate-50 flex flex-col ${!current ? 'opacity-30' : ''}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className={`w-7 h-7 flex items-center justify-center rounded-full text-sm font-bold ${today ? 'bg-indigo-600 text-white' : 'text-slate-600'}`}>
                                                {date.getDate()}
                                            </span>
                                            {person && current && (
                                                <div className={`w-2 h-2 rounded-full ${date.getTime() < today.getTime() ? 'bg-slate-300' : 'bg-emerald-500'}`}></div>
                                            )}
                                        </div>
                                        {current && (
                                            <select 
                                                value={person || ''} 
                                                onChange={(e) => handleSelectPerson(date, e.target.value)}
                                                className={`mt-auto w-full text-xs py-1 px-1 rounded-lg border-none focus:ring-0 cursor-pointer ${person ? 'text-indigo-600 font-bold bg-indigo-50' : 'text-slate-300'}`}
                                            >
                                                <option value="">—</option>
                                                {NAMES.map(n => <option key={n} value={n}>{n}</option>)}
                                            </select>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    <div className="mt-4 flex justify-between items-center px-2">
                        <div className="flex gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                            <div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> План</div>
                            <div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-slate-300"></div> Архив</div>
                        </div>
                        {isSaving && <div className="text-[10px] font-bold text-indigo-500 uppercase animate-pulse">Сохранение...</div>}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
